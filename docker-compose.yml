services:
  backend:
    build:
      context: ./backend
    platform: linux/arm64
    expose:
      - "8080"
    environment:
      - MANAGED_DIR=/data
      - PORT=8080
      - DB_PATH=/db/pi-manager.db
    volumes:
      - ${PI_MANAGED_DIR:-/tmp}:/data
      - db-data:/db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    platform: linux/arm64
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
